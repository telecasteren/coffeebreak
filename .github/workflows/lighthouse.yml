name: Lighthouse CI (production)

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # every Monday 06:00 UTC

permissions:
  contents: write

jobs:
  lighthouse:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Collect Lighthouse reports
        run: pnpm exec lhci collect --config=./lighthouserc.json

      - name: Assert Lighthouse thresholds
        run: pnpm exec lhci assert --config=./lighthouserc.json

      - name: Upload Lighthouse reports
        run: pnpm exec lhci upload --config=./lighthouserc.json

      - name: Extract scores to public/lighthouse/scores.json
        run: node scripts/extract-lighthouse-scores.mjs

      - name: Commit updated scores
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/lighthouse/scores.json
          git diff --cached --quiet || git commit -m "chore: update lighthouse scores [skip ci]"
          git push
